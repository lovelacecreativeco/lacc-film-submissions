# compose.yaml
# /opt/stacks/film-drop/compose.yaml

services:
  film-drop:
    image: ghcr.io/${GITHUB_REPOSITORY:-lovelacecreativeco/film-drop}:latest
    container_name: film-drop
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3035}:3000"
    volumes:
      - ${UPLOAD_HOST_PATH}:/data
    environment:
      UPLOAD_DIR: /data
      UPLOAD_PASS: "${UPLOAD_PASS}"
      PORT: 3000
